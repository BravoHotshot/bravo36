<g transform="translate(114,114)">
  <rect x="0"   y="0" width="38" height="28" rx="3" class="k-ct"/>
  <text x="6"   y="9"  class="kt kp t-ct">Z</text>
  <text x="32"  y="23" class="kt km t-ct">⌃</text>

  <rect x="42"  y="0" width="38" height="28" rx="3" class="key"/><text x="61"  y="14" class="kt">X</text>
  <rect x="84"  y="0" width="38" height="28" rx="3" class="key"/><text x="103" y="14" class="kt">C</text>
  <rect x="126" y="0" width="38" height="28" rx="3" class="key"/><text x="145" y="14" class="kt">V</text>
  <rect x="168" y="0" width="38" height="28" rx="3" class="key"/><text x="187" y="14" class="kt">B</text>

  <rect x="286" y="0" width="38" height="28" rx="3" class="key"/><text x="305" y="14" class="kt">N</text>
  <rect x="328" y="0" width="38" height="28" rx="3" class="key"/><text x="347" y="14" class="kt">M</text>
  <rect x="370" y="0" width="38" height="28" rx="3" class="key"/><text x="389" y="14" class="kt">,</text>
  <rect x="412" y="0" width="38" height="28" rx="3" class="key"/><text x="431" y="14" class="kt">.</text>

  <rect x="454" y="0" width="38" height="28" rx="3" class="k-ct"/>
  <text x="460" y="9"  class="kt kp t-ct">/</text>
  <text x="486" y="23" class="kt km t-ct">⌃</text>
</g>

<!-- thumb row y=148 -->
<!--
  Thumb keys: ESC(⌥) ⌘ BSP | TAB SPC(NUM) ENT(NAV)
  Left thumb: keys 3,4,5 of left half → x offsets 84,126,168
  Right thumb: keys 1,2,3 of right half → x offsets 286,328,370
-->
<g transform="translate(114,148)">
  <rect x="84"  y="0" width="38" height="28" rx="3" class="k-al"/>
  <text x="90"  y="9"  class="kt klp t-al">ESC</text>
  <text x="116" y="23" class="kt km t-al">⌥</text>

  <rect x="126" y="0" width="38" height="28" rx="3" class="key"/><text x="145" y="14" class="kt">⌘</text>
  <rect x="168" y="0" width="38" height="28" rx="3" class="key"/><text x="187" y="14" class="kt">BSP</text>

  <rect x="286" y="0" width="38" height="28" rx="3" class="key"/><text x="305" y="14" class="kt">TAB</text>

  <rect x="328" y="0" width="38" height="28" rx="3" class="k-la"/>
  <text x="334" y="9"  class="kt klp t-la">SPC</text>
  <text x="360" y="23" class="kt klm t-la">NUM</text>

  <rect x="370" y="0" width="38" height="28" rx="3" class="k-la"/>
  <text x="376" y="9"  class="kt klp t-la">ENT</text>
  <text x="402" y="23" class="kt klm t-la">NAV</text>
</g>

