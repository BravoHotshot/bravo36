<svg viewBox="0 0 720 700" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
<style>
  :root {
    --bg:      #ffffff;
    --panel:   #f6f8fa;
    --panel-s: #d0d7de;
    --key:     #ffffff;
    --key-s:   #d0d7de;
    --key-t:   #24292f;
    --dead:    #eaeef2;
    --dead-s:  #d0d7de;
    --sect:    #57606a;

    --shift-bg: #ddf4ff; --shift-s: #0969da; --shift-t: #0969da;
    --ctrl-bg:  #dafbe1; --ctrl-s:  #1a7f37; --ctrl-t:  #1a7f37;
    --alt-bg:   #fbefff; --alt-s:   #8250df; --alt-t:   #8250df;
    --num-bg:   #fff8c5; --num-s:   #9a6700; --num-t:   #24292f;
    --lay-bg:   #fff1e5; --lay-s:   #bc4c00; --lay-t:   #bc4c00;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #0d1117;
      --panel:   #161b22;
      --panel-s: #30363d;
      --key:     #21262d;
      --key-s:   #30363d;
      --key-t:   #e6edf3;
      --dead:    #161b22;
      --dead-s:  #21262d;
      --sect:    #8b949e;

      --shift-bg: #0d2d4a; --shift-s: #388bfd; --shift-t: #79c0ff;
      --ctrl-bg:  #0d2b1a; --ctrl-s:  #3fb950; --ctrl-t:  #56d364;
      --alt-bg:   #1e0f3a; --alt-s:   #bc8cff; --alt-t:   #d2a8ff;
      --num-bg:   #2b1f00; --num-s:   #d29922; --num-t:   #e6edf3;
      --lay-bg:   #2b1100; --lay-s:   #f0883e; --lay-t:   #f0883e;
    }
  }
  .bg      { fill: var(--bg); }
  .panel   { fill: var(--panel); stroke: var(--panel-s); stroke-width: 1; }
  .key     { fill: var(--key);  stroke: var(--key-s);  stroke-width: 0.8; }
  .dead    { fill: var(--dead); stroke: var(--dead-s); stroke-width: 0.5; opacity: 0.5; }
  .sect    { fill: var(--sect); font-size: 11px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
  .kt      { fill: var(--key-t); font-size: 11px; text-anchor: middle; dominant-baseline: middle; }

  .k-sh { fill: var(--shift-bg); stroke: var(--shift-s); stroke-width: 1; }
  .k-ct { fill: var(--ctrl-bg);  stroke: var(--ctrl-s);  stroke-width: 1; }
  .k-al { fill: var(--alt-bg);   stroke: var(--alt-s);   stroke-width: 1; }
  .k-nu { fill: var(--num-bg);   stroke: var(--num-s);   stroke-width: 1; }
  .k-la { fill: var(--lay-bg);   stroke: var(--lay-s);   stroke-width: 1; }

  .t-sh { fill: var(--shift-t); }
  .t-ct { fill: var(--ctrl-t);  }
  .t-al { fill: var(--alt-t);   }
  .t-nu { fill: var(--num-t);   }
  .t-la { fill: var(--lay-t);   }

  /* dual-label keys: primary top-left, modifier bottom-right */
  .kp  { font-size: 10px; text-anchor: start; dominant-baseline: auto; }
  .km  { font-size: 8px;  text-anchor: end;   dominant-baseline: auto; }
  /* layer thumb keys: primary top-left, layer name bottom-right */
  .klp { font-size: 8px; text-anchor: start; dominant-baseline: auto; }
  .klm { font-size: 7px; text-anchor: end;   dominant-baseline: auto; }
</style>

<rect width="720" height="700" rx="12" class="bg"/>

<!--
  Layout math:
  Key width=38, gap=4, pitch=42
  5 keys per half → half-width = 5*38 + 4*4 = 206
  Split gap = 80px
  Total keys width = 206 + 80 + 206 = 492
  Panel x=20, width=680 → inner center = 360
  Left half starts at: 360 - 492/2 = 360 - 246 = 114
  Right half starts at: 114 + 206 + 80 = 400
  All rows use: translate(114, y) for left, right half keys offset by 286 (=400-114)
-->

<!-- ═══ BASE ═══ -->
<rect x="20" y="14" width="680" height="196" rx="8" class="panel"/>
<text x="360" y="34" class="sect">BASE</text>

<!-- row1 y=46 -->
<g transform="translate(114,46)">
  <rect x="0"   y="0" width="38" height="28" rx="3" class="key"/><text x="19"  y="14" class="kt">Q</text>
  <rect x="42"  y="0" width="38" height="28" rx="3" class="key"/><text x="61"  y="14" class="kt">W</text>
  <rect x="84"  y="0" width="38" height="28" rx="3" class="key"/><text x="103" y="14" class="kt">E</text>
  <rect x="126" y="0" width="38" height="28" rx="3" class="key"/><text x="145" y="14" class="kt">R</text>
  <rect x="168" y="0" width="38" height="28" rx="3" class="key"/><text x="187" y="14" class="kt">T</text>
  <rect x="286" y="0" width="38" height="28" rx="3" class="key"/><text x="305" y="14" class="kt">Y</text>
  <rect x="328" y="0" width="38" height="28" rx="3" class="key"/><text x="347" y="14" class="kt">U</text>
  <rect x="370" y="0" width="38" height="28" rx="3" class="key"/><text x="389" y="14" class="kt">I</text>
  <rect x="412" y="0" width="38" height="28" rx="3" class="key"/><text x="431" y="14" class="kt">O</text>
  <rect x="454" y="0" width="38" height="28" rx="3" class="key"/><text x="473" y="14" class="kt">P</text>
</g>

<!-- row2 y=80 -->
<g transform="translate(114,80)">
  <rect x="0"   y="0" width="38" height="28" rx="3" class="k-sh"/>
  <text x="6"   y="9"  class="kt kp t-sh">A</text>
  <text x="32"  y="23" class="kt km t-sh">⇧</text>

  <rect x="42"  y="0" width="38" height="28" rx="3" class="key"/><text x="61"  y="14" class="kt">S</text>
  <rect x="84"  y="0" width="38" height="28" rx="3" class="key"/><text x="103" y="14" class="kt">D</text>
  <rect x="126" y="0" width="38" height="28" rx="3" class="key"/><text x="145" y="14" class="kt">F</text>
  <rect x="168" y="0" width="38" height="28" rx="3" class="key"/><text x="187" y="14" class="kt">G</text>

