<!-- ═══ Legend ═══ -->
<rect x="20" y="644" width="680" height="44" rx="8" class="panel"/>
<!--
  5 items. Each: 14px swatch + 6px gap + text.
  Measured text widths at font-size 10px (monospace ~6px/char):
    "⇧ Shift hold" = 13 chars ≈ 78px  → item width ≈ 98px
  Total 5 items * 98 = 490px
  Center in 680: left offset = (680-490)/2 = 95 → absolute x = 20+95 = 115
  Item pitch = 98px
-->
<g transform="translate(115, 666)">
  <rect x="0"   y="0" width="14" height="14" rx="2" class="k-sh"/>
  <text x="20"  y="7" class="t-sh" font-size="10" text-anchor="start" dominant-baseline="middle">⇧ Shift hold</text>

  <rect x="98"  y="0" width="14" height="14" rx="2" class="k-ct"/>
  <text x="118" y="7" class="t-ct" font-size="10" text-anchor="start" dominant-baseline="middle">⌃ Ctrl hold</text>

  <rect x="196" y="0" width="14" height="14" rx="2" class="k-al"/>
  <text x="216" y="7" class="t-al" font-size="10" text-anchor="start" dominant-baseline="middle">⌥ Alt hold</text>

  <rect x="294" y="0" width="14" height="14" rx="2" class="k-nu"/>
  <text x="314" y="7" class="t-nu" font-size="10" text-anchor="start" dominant-baseline="middle">NUM layer</text>

  <rect x="392" y="0" width="14" height="14" rx="2" class="k-la"/>
  <text x="412" y="7" class="t-la" font-size="10" text-anchor="start" dominant-baseline="middle">Layer hold</text>
</g>

</svg>
