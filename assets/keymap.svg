<!-- ═══ Legend ═══ -->
<rect x="20" y="644" width="680" height="44" rx="8" class="panel"/>
<!--
  5 legend items evenly spaced across 680px inner width
  Each item: 12px swatch + 4px gap + ~80px text = ~96px
  Total: 5*96 = 480, padding each side = (680-480)/2 = 100 → start x=120
  Item pitch = 120px
-->
<g transform="translate(120, 660)">
  <rect x="0"  y="-6" width="12" height="12" rx="2" class="k-sh"/>
  <text x="17" y="1" class="kt t-sh" text-anchor="start" dominant-baseline="middle" font-size="10">⇧ Shift hold</text>

  <rect x="120" y="-6" width="12" height="12" rx="2" class="k-ct"/>
  <text x="137" y="1" class="kt t-ct" text-anchor="start" dominant-baseline="middle" font-size="10">⌃ Ctrl hold</text>

  <rect x="240" y="-6" width="12" height="12" rx="2" class="k-al"/>
  <text x="257" y="1" class="kt t-al" text-anchor="start" dominant-baseline="middle" font-size="10">⌥ Alt hold</text>

  <rect x="360" y="-6" width="12" height="12" rx="2" class="k-nu"/>
  <text x="377" y="1" class="kt t-nu" text-anchor="start" dominant-baseline="middle" font-size="10">NUM layer</text>

  <rect x="480" y="-6" width="12" height="12" rx="2" class="k-la"/>
  <text x="497" y="1" class="kt t-la" text-anchor="start" dominant-baseline="middle" font-size="10">Layer hold</text>
</g>

</svg>
