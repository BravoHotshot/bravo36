  <rect x="356" y="0" width="38" height="28" rx="3" class="key"/><text x="375" y="14" class="kt">M</text>
  <rect x="398" y="0" width="38" height="28" rx="3" class="key"/><text x="417" y="14" class="kt">,</text>
  <rect x="440" y="0" width="38" height="28" rx="3" class="key"/><text x="459" y="14" class="kt">.</text>

  <rect x="482" y="0" width="38" height="28" rx="3" class="k-ctrl"/>
