<svg viewBox="0 0 720 680" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
<style>
  :root {
    --bg:       #ffffff;
    --panel:    #f6f8fa;
    --panel-s:  #d0d7de;
    --key:      #ffffff;
    --key-s:    #d0d7de;
    --key-t:    #24292f;
    --sect:     #57606a;
    --inactive: #d0d7de;

    --mod-shift-bg: #ddf4ff;
    --mod-shift-s:  #0969da;
    --mod-shift-t:  #0969da;

    --mod-ctrl-bg:  #dafbe1;
    --mod-ctrl-s:   #1a7f37;
    --mod-ctrl-t:   #1a7f37;

    --mod-alt-bg:   #fbefff;
    --mod-alt-s:    #8250df;
    --mod-alt-t:    #8250df;

    --num-bg:       #fff8c5;
    --num-s:        #9a6700;
    --num-t:        #24292f;

    --layer-bg:     #fff1e5;
    --layer-s:      #bc4c00;
    --layer-t:      #bc4c00;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #0d1117;
      --panel:    #161b22;
      --panel-s:  #30363d;
      --key:      #21262d;
      --key-s:    #30363d;
      --key-t:    #e6edf3;
      --sect:     #8b949e;
      --inactive: #21262d;

      --mod-shift-bg: #0d2d4a;
      --mod-shift-s:  #388bfd;
      --mod-shift-t:  #79c0ff;

      --mod-ctrl-bg:  #0d2b1a;
      --mod-ctrl-s:   #3fb950;
      --mod-ctrl-t:   #56d364;

      --mod-alt-bg:   #1e0f3a;
      --mod-alt-s:    #bc8cff;
      --mod-alt-t:    #d2a8ff;

      --num-bg:       #2b1f00;
      --num-s:        #d29922;
      --num-t:        #e6edf3;

      --layer-bg:     #2b1100;
      --layer-s:      #f0883e;
      --layer-t:      #f0883e;
    }
  }
  .bg     { fill: var(--bg); }
  .panel  { fill: var(--panel); stroke: var(--panel-s); stroke-width: 1; }
  .key    { fill: var(--key);   stroke: var(--key-s);   stroke-width: 0.8; }
  .dead   { fill: var(--inactive); stroke: var(--panel-s); stroke-width: 0.5; }
  .kt     { fill: var(--key-t); font-size: 11px; text-anchor: middle; dominant-baseline: middle; }
  .sect   { fill: var(--sect);  font-size: 11px; font-weight: 600; text-anchor: middle; }

  .k-shift { fill: var(--mod-shift-bg); stroke: var(--mod-shift-s); stroke-width: 1; }
  .t-shift { fill: var(--mod-shift-t);  font-size: 9px; }
  .k-ctrl  { fill: var(--mod-ctrl-bg);  stroke: var(--mod-ctrl-s);  stroke-width: 1; }
  .t-ctrl  { fill: var(--mod-ctrl-t);   font-size: 9px; }
  .k-alt   { fill: var(--mod-alt-bg);   stroke: var(--mod-alt-s);   stroke-width: 1; }
  .t-alt   { fill: var(--mod-alt-t);    font-size: 9px; }
  .k-num   { fill: var(--num-bg);       stroke: var(--num-s);       stroke-width: 1; }
  .t-num   { fill: var(--num-t);        font-size: 11px; text-anchor: middle; dominant-baseline: middle; }
  .k-layer { fill: var(--layer-bg);     stroke: var(--layer-s);     stroke-width: 1; }
  .t-layer { fill: var(--layer-t);      font-size: 8px; }
  .t-nav   { fill: var(--mod-shift-t);  font-size: 11px; text-anchor: middle; dominant-baseline: middle; }
</style>

<rect width="720" height="680" rx="12" class="bg"/>

<!-- ═══ BASE ═══ -->
<rect x="20" y="14" width="680" height="186" rx="8" class="panel"/>
<text x="360" y="33" class="sect">BASE</text>

<!-- Row 1 -->
<g transform="translate(30,42)">
  <rect x="0"   y="0" width="38" height="28" rx="3" class="key"/><text x="19"  y="14" class="kt">Q</text>
  <rect x="42"  y="0" width="38" height="28" rx="3" class="key"/><text x="61"  y="14" class="kt">W</text>
  <rect x="84"  y="0" width="38" height="28" rx="3" class="key"/><text x="103" y="14" class="kt">E</text>
  <rect x="126" y="0" width="38" height="28" rx="3" class="key"/><text x="145" y="14" class="kt">R</text>
