  <rect x="328" y="0" width="38" height="28" rx="3" class="key"/><text x="347" y="14" class="kt">J</text>
  <rect x="370" y="0" width="38" height="28" rx="3" class="key"/><text x="389" y="14" class="kt">K</text>
  <rect x="412" y="0" width="38" height="28" rx="3" class="key"/><text x="431" y="14" class="kt">L</text>

  <rect x="454" y="0" width="38" height="28" rx="3" class="k-sh"/>
  <text x="460" y="9"  class="kt kp t-sh">;</text>
  <text x="486" y="23" class="kt km t-sh">⇧</text>
</g>

